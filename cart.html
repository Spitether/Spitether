<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart – Marionette</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/cart.css">
</head>
<body class="page page-cart">
  <div id="transition-overlay"></div>
  <header class="site-header">
    <div class="logo"><a href="index.html">Marionette</a></div>
    <nav class="nav">
      <a href="index.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="cart.html" class="nav-cart active">Cart</a>
    </nav>
  </header>

  <main class="main cart-main">
    <section class="cart-items" id="cart-items">
      <!-- Filled by cart.js -->
    </section>

    <aside class="cart-summary">
      <h2>Order Summary</h2>
      <div class="summary-row">
        <span>Subtotal</span><span id="summary-subtotal"></span>
      </div>
      <div class="summary-row">
        <span>Fees</span><span id="summary-fees"></span>
      </div>
      <div class="summary-row">
        <span>Tax</span><span id="summary-tax"></span>
      </div>
      <div class="summary-row summary-total">
        <span>Total</span><span id="summary-total"></span>
      </div>
      <button id="checkout-button" class="btn-primary">Checkout</button>
    </aside>
  </main>

  <footer class="site-footer">
    <a href="policies.html">Policies</a>
    <span>© Your Store</span>
  </footer>

  <script src="scripts/utils.js"></script>
  <script src="scripts/cart.js"></script>
  <script src="scripts/checkout.js"></script>
  <script src="scripts/spotlight.js"></script>
  <script src="scripts/transition.js"></script>
</body>
</html>

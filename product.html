<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product – Your Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/product.css">
</head>
<body class="page page-product">
  <header class="site-header">
    <div class="logo"><a href="index.html">Your Store</a></div>
    <nav class="nav">
      <a href="index.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="cart.html" class="nav-cart">Cart</a>
    </nav>
  </header>

  <main class="main product-main">
    <section class="product-detail" id="product-detail">
      <div class="product-image-wrap">
        <img id="product-image" alt="">
        <div class="thumbnail-row" id="thumbnail-row"></div>
      </div>
      <div class="product-info">
        <h1 id="product-title"></h1>
        <p id="product-price" class="product-price"></p>
        <p id="product-stock" class="product-stock"></p>
        <p id="product-description" class="product-description"></p>

        <button id="add-to-cart" class="btn-primary">Add to cart</button>
      </div>
    </section>
  </main>
  <div class="mobile-cart-bar" id="mobile-cart-bar">
  <div class="mobile-cart-info">
    <span id="mobile-cart-title"></span>
    <span id="mobile-cart-price"></span>
  </div>
  <button id="mobile-add-to-cart">Add to cart</button>
</div>


  <footer class="site-footer">
    <a href="policies.html">Policies</a>
    <span>© Your Store</span>
  </footer>

  <script src="scripts/product.js"></script>
  <script src="scripts/util.js"></script>
  <script src="scripts/spotlight.js"></script>
</body>
</html>
